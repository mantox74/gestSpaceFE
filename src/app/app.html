<app-spinner></app-spinner>
<div class="flex flex-col h-screen overflow-hidden">
    <header class="bg-primary text-primary-contrast h-16 flex items-center justify-between px-4 shadow-md z-10">
        <div class="flex items-center gap-3">
            <button mat-icon-button [disabled]="!authService.isLoggedIn()" (click)="toggleMenu()">
                <mat-icon>menu</mat-icon>
            </button>

            <span class="text-xl font-bold tracking-wide">GestSpace - Gestione spazi</span>
        </div>

        <div>
            @if(authService.isLoggedIn() && authService.currentUser()) {
            <div class="mr-2">
                {{authService.currentUser()!.nome!.charAt(0) + authService.currentUser()?.cognome?.charAt(0)}}
            </div>
            } @else {
            <button mat-icon-button (click)="navigateToLogin()">
                <mat-icon>login</mat-icon>
            </button>
            }
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">

        <aside class="bg-content border-r border-gray-300 transition-all duration-200 overflow-x-hidden overflow-y-auto"
            [class]="isMenuOpen() ? 'w-40' : 'w-0'">

            <div class="p-3">

                <div class="flex align-items-center gap-2 p-2 text-[var(--p-text-color)]">
                    <a routerLink="/" pButton>
                        <i class="pi pi-home" style="font-size: 1.25rem;"></i>
                        <span>Dashboard</span>
                    </a>
                </div>

            </div>
        </aside>

        <main class="flex-1 bg-surface-50 overflow-y-auto p-4">
            <router-outlet></router-outlet>
        </main>

    </div>
</div>
