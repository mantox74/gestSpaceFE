<div class="preventivi-list__wrapper">

    <div class="function-menu__wrapper flex justify-end mb-4 mt-4">
        <button matButton="filled">
            <mat-icon>add</mat-icon>
            Aggiugi preventivo
        </button>
    </div>

    <table mat-table [dataSource]="preventiviList()" class="mat-elevation-z8">
        <ng-container matColumnDef="id">
            <th mat-header-cell *matHeaderCellDef> ID </th>
            <td mat-cell *matCellDef="let element"> {{element.id}} </td>
        </ng-container>

        <ng-container matColumnDef="cliente_nome">
            <th mat-header-cell *matHeaderCellDef> Cliente </th>
            <td mat-cell *matCellDef="let element"> {{element.cliente.cognome}} {{element.cliente.nome}} </td>
        </ng-container>

        <ng-container matColumnDef="spazio_nome">
            <th mat-header-cell *matHeaderCellDef> Spazio </th>
            <td mat-cell *matCellDef="let element"> {{element.spazio.nome}} </td>
        </ng-container>

        <ng-container matColumnDef="totale_preventivo">
            <th mat-header-cell *matHeaderCellDef> Totale Preventivo </th>
            <td mat-cell *matCellDef="let element"> {{element.importo_totale}} </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
    <!-- {{preventiviList()|json}} -->
</div>
